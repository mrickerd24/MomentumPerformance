<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>
  <div class="lang-box">
    <button id="lang-toggle" class="lang-btn">EN / FR</button>
  </div>
</header>

<main class="app-main">
  <div class="container">
    <div class="form-box">

      <form id="signupForm">

        <!-- Roles -->
        <label data-key="accountType">Account type</label><br><br>
        <div class="role-option">
          <input type="checkbox" name="role" value="coach" id="roleCoach" />
          <label for="roleCoach" data-key="coach">Coach</label>
        </div><br>
        <div class="role-option">
          <input type="checkbox" name="role" value="skater" id="roleSkater" />
          <label for="roleSkater" data-key="skater">Skater</label>
        </div><br>
        <div class="role-option">
          <input type="checkbox" name="role" value="parent" id="roleParent" />
          <label for="roleParent" data-key="parent">Parent</label>
        </div><br>
        <div class="role-option">
          <input type="checkbox" name="role" value="admin" id="roleAdmin" />
          <label for="roleAdmin" data-key="admin">Administrator</label>
        </div><br><br>

        <label for="name" data-key="name">Name</label><br>
        <input type="text" id="name" placeholder="Name" />
        <div id="name-error" class="field-error"></div>

        <label for="lastName" data-key="lastName">Last Name</label><br>
        <input type="text" id="lastName" placeholder="Last name" />
        <div id="lastName-error" class="field-error"></div>

        <label for="emailAddress" data-key="email">Email</label><br>
        <input type="email" id="emailAddress" placeholder="Email address" />
        <div id="emailAddress-error" class="field-error"></div><br>

        <label for="phoneNumber" data-key="phoneNumber">Phone number</label><br>
        <input type="tel" id="phoneNumber" placeholder="XXX-XXX-XXXX" />
        <div id="phoneNumber-error" class="field-error"></div><br>

        <label for="skateCanadaNumber" data-key="skateCan">Skate Canada number</label><br>
        <input type="text" id="skateCanadaNumber" placeholder="XXXXXXXXXXX" />
        <div id="skateCanadaNumber-error" class="field-error"></div><br>

        <label for="password" data-key="createpw">Create a password</label><br>
        <input type="password" id="password" placeholder="Password" />
        <div id="password-error" class="field-error"></div>

        <label for="passwordConfirmation" data-key="confirmpw">Confirm password</label><br>
        <input type="password" id="passwordConfirmation" placeholder="Password confirmation" />
        <div id="passwordConfirmation-error" class="field-error"></div>
        <br><br>

        <button type="submit" id="createAccount" data-key="createAccount">Create account</button>
        <br><br>

      </form>

      <a href="index.html" data-key="toLogin">Back to login</a>

    </div>
  </div>
</main>

<footer class="app-footer">
  <div class="footer-content">
    <span>© 2026 Momentum Performance</span>
  </div>
  <script type="module" src="signupForm.js"></script>
</footer>
</body>
</html>
