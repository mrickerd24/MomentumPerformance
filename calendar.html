<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>
</header>

<main class="app-main">
  <div class="container">
    

        <div class="form-box">
            <div id="view-toggle">
                <button class="view-btn" id="btn-month" data-key="monthView">Month</button>
                <button class="view-btn" id="btn-week" data-key="weekView">Week</button>
                <button class="view-btn" id="btn-day" data-key="dayView">Day</button>
            </div>

            <div id="period-nav">
                <button id="prev-btn">&#8592;</button>
                <span id="period-label"></span>
                <button id="next-btn">&#8594;</button>
            </div>
            <div id="calendar-grid"></div>
        </div>
      


    
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-item" id="dashboard-btn">
    <img src="dashboardIcon.png" class="icon" />
    <span data-key="dashboard">Dashboard</span>
  </button>
  <button class="nav-item" id="calendar-btn">
    <img src="calendarIcon.png" class="icon" />
    <span data-key="calendar">Calendar</span>
  </button>
  <button class="nav-item" id="payment-btn">
    <img src="paymentIcon.png" class="icon" />
    <span data-key="payment">Payment</span>
  </button>
  <button class="nav-item" id="settings-btn">
    <img src="settings.png" class="icon" />
    <span data-key="settings">Settings</span>
  </button>
  <button class="nav-item" id="logout-btn">
    <img src="logout.png" class="icon" />
    <span data-key="logout">Logout</span>
  </button>
</nav>

<footer class="app-footer">
  <br><br>
  <div class="footer-content">
    <span>© 2026 Momentum Performance</span>
  </div>
</footer>

<script type="module" src="calendar.js"></script>
</body>
</html>
