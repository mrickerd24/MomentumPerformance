<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>

</header>
  <main class="app-main">
  
	  <div class="container">
      <div class="form-box">
        
        <h2 data-key="resetYourPassword">Reset your password</h2>
          <div>
	          <label for="emailAddress" data-key="email">Email</label><br>
	          <input type="email" id="emailAddress" placeholder="Email address" autocomplete="email"  />
	        <div id="emailAddress-error" class="field-error"></div>
          <br><br>

          <button type="submit" id="reset" data-key="reset">Reset</button>



    

	
	

      </div>

	  </div>
 
    <a href="index.html" data-key="toLogin">Back to login</a> 
  </main>


<footer class="app-footer">
  <br><br>
  <div class="footer-content">
    <span>© 2026 Momentum Performance</span>
  </div>
</footer>

<script type="module" src="resetPassword.js"></script>
</body>
</html>
