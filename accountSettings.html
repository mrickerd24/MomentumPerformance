<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    #deleteModal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #deleteModal.open {
      display: flex;
    }
    .delete-modal-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: calc(100% - 48px);
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .delete-modal-card h3 {
      color: #C9372C;
      margin: 0 0 10px 0;
    }
    .delete-modal-card p {
      font-size: 13px;
      color: #5E6C84;
      margin: 0 0 16px 0;
    }
    .delete-modal-card input {
      width: 100%;
      margin-bottom: 8px;
    }
    .modal-btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .modal-btn-row button {
      flex: 1;
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>
</header>

<main class="app-main">
  <div class="container">
    <div class="form-box">

      <form id="accountSettingsForm">

        <h2 data-key="accountSettings">Account settings</h2>

        <!-- Language -->
        <legend data-key="langselect">Preferred language</legend><br><br>
        <div class="language-option">
          <input type="radio" name="language" value="en" id="english-language" />
          <label for="english-language" data-key="english">English</label>
        </div><br>
        <div class="language-option">
          <input type="radio" name="language" value="fr" id="french-language" />
          <label for="french-language" data-key="french">French</label>
        </div><br><br>

        <!-- Name row -->
        <div class="row">
          <div>
            <label for="name" data-key="name">Name</label><br>
            <input type="text" id="name" placeholder="Name" autocomplete="name" />
            <div id="name-error" class="field-error"></div>
          </div>
          <div>
            <label for="lastName" data-key="lastName">Last Name</label><br>
            <input type="text" id="lastName" placeholder="Last name" autocomplete="family-name" />
            <div id="lastName-error" class="field-error"></div>
          </div>
        </div><br>

        <!-- Parent name — shown for skater_parent only -->
        <div id="parentName-row">
          <label for="parentName" data-key="parentName">Parent name (optional)</label><br>
          <input type="text" id="parentName" placeholder="Parent name" autocomplete="additional-name" />
          <br><br>
        </div>

        <!-- Email + Phone -->
        <div class="row">
          <div>
            <label for="emailAddress" data-key="email">Email</label><br>
            <input type="email" id="emailAddress" placeholder="Email address" autocomplete="email" />
            <div id="emailAddress-error" class="field-error"></div>
          </div>
          <div>
            <label for="phoneNumber" data-key="phoneNumber">Phone number</label><br>
            <input type="tel" id="phoneNumber" placeholder="XXX-XXX-XXXX" autocomplete="tel" />
            <div id="phoneNumber-error" class="field-error"></div>
          </div>
        </div><br>

        <!-- Skate Canada number — shown for coach + skater_parent -->
        <div id="skateCan-row">
          <label for="skateCanadaNumber" data-key="skateCan">Skate Canada number</label><br>
          <input type="text" id="skateCanadaNumber" placeholder="XXXXXXXXXXX" />
          <div id="skateCanadaNumber-error" class="field-error"></div>
          <br>
        </div>

        <!-- Club search — shown for non-admin users -->
        <div id="clubSearch-row">
          <label>Your skating club</label>
          <div id="selected-clubs"></div>
          <br>
          <input type="text" id="clubSearch" placeholder="Search for a club" autocomplete="off" />
          <div id="club-results"></div>
          <div id="clubSearch-error" class="field-error"></div>
          <br>
        </div>

        <!-- Club number — shown for admin only -->
        <div id="clubNum-row">
          <label for="skateCanClubNumber" data-key="skateCanClubNumber">Skate Canada club number</label><br>
          <input type="text" id="skateCanClubNumber" placeholder="XXXXXXXXXXX" />
          <div id="skateCanClubNumber-error" class="field-error"></div>
          <br>
        </div>

        <!-- Password -->
        <div class="row">
          <div>
            <label for="changepassword" data-key="changepw">Change password</label><br>
            <input type="password" id="changepassword" placeholder="New password" autocomplete="new-password" />
            <div id="password-error" class="field-error"></div>
          </div>
          <div>
            <label for="passwordConfirmation" data-key="confirmNewpw">Confirm new password</label><br>
            <input type="password" id="passwordConfirmation" placeholder="Confirm password" autocomplete="new-password" />
            <div id="passwordConfirmation-error" class="field-error"></div>
          </div>
        </div><br>

        <button type="submit" id="saveChanges" data-key="saveChanges">Save changes</button>
        <br><br>

      </form>

      <!-- Delete account trigger — type="button" prevents any form interaction -->
      <hr style="border: none; border-top: 1px solid #DFE1E6; margin: 8px 0 20px 0;">
      <button type="button" id="openDeleteModal" data-key="deleteAccount" style="background-color: #C9372C;">Delete account</button>
      <br><br>

    </div>
  </div>
</main>

<!-- Delete account modal — toggled via .open class -->
<div id="deleteModal">
  <div class="delete-modal-card">
    <h3 data-key="deleteAccount">Delete account</h3>
    <p data-key="deleteAccountWarning">This action is permanent and cannot be undone. Type <strong>delete</strong> to confirm.</p>
    <input
      type="text"
      id="deleteConfirmInput"
      autocomplete="off"
      data-key-placeholder="deleteConfirmPlaceholder"
      placeholder='Type "delete" to confirm'
    />
    <div id="deleteConfirm-error" class="field-error"></div>
    <div class="modal-btn-row">
      <button type="button" id="cancelDeleteBtn" data-key="cancel" style="background: #5E6C84;">Cancel</button>
      <button type="button" id="confirmDeleteBtn" data-key="deleteAccountBtn" style="background: #C9372C;">Delete my account</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" id="dashboard-btn">
    <img src="dashboardIcon.png" class="icon" />
    <span data-key="dashboard">Dashboard</span>
  </button>
  <button class="nav-item" id="calendar-btn">
    <img src="calendarIcon.png" class="icon" />
    <span data-key="calendar">Calendar</span>
  </button>
  <button class="nav-item" id="payment-btn">
    <img src="paymentIcon.png" class="icon" />
    <span data-key="payment">Payment</span>
  </button>
  <button class="nav-item" id="settings-btn">
    <img src="settings.png" class="icon" />
    <span data-key="settings">Settings</span>
  </button>
  <button class="nav-item" id="logout-btn">
    <img src="logout.png" class="icon" />
    <span data-key="logout">Logout</span>
  </button>
</nav>

<footer class="app-footer">
  <br><br>
  <div class="footer-content">
    <span>© 2026 Momentum Performance</span>
  </div>
</footer>

<script type="module" src="accountSettings.js"></script>
</body>
</html>
