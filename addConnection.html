<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>
</header>

<main class="app-main">
  <div class="container">
    <div class="form-box">

      <h2 id="page-title"></h2>

      <label for="searchInput" id="search-label"></label><br>
      <input type="text" id="searchInput" autocomplete="off" /><br><br>
      <button id="searchBtn"></button>
      <br><br>

      <div id="search-results"></div>

      <div id="sent-section" style="display:none">
        <hr style="margin: 20px 0;">
        <h3 id="sent-title"></h3>
        <div id="sent-list"></div>
      </div>

      <div id="pending-section" style="display:none">
        <hr style="margin: 20px 0;">
        <h3 id="pending-title"></h3>
        <div id="pending-list"></div>
      </div>

      <div id="connected-section" style="display:none">
        <hr style="margin: 20px 0;">
        <h3 id="connected-title"></h3>
        <div id="connected-list"></div>
      </div>

    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-item" id="dashboard-btn">
    <img src="dashboardIcon.png" class="icon" />
    <span data-key="dashboard">Dashboard</span>
  </button>
  <button class="nav-item" id="calendar-btn">
    <img src="calendarIcon.png" class="icon" />
    <span data-key="calendar">Calendar</span>
  </button>
  <button class="nav-item" id="payment-btn">
    <img src="paymentIcon.png" class="icon" />
    <span data-key="payment">Payment</span>
  </button>
  <button class="nav-item" id="settings-btn">
    <img src="settings.png" class="icon" />
    <span data-key="settings">Settings</span>
  </button>
  <button class="nav-item" id="logout-btn">
    <img src="logout.png" class="icon" />
    <span data-key="logout">Logout</span>
  </button>
</nav>

<footer class="app-footer">
  <br><br>
  <div class="footer-content">
    <span>© 2026 Momentum Performance</span>
  </div>
</footer>

<script type="module" src="addConnection.js"></script>
</body>
</html>
