<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="logo" align=center>Momentum Performance</div>
	  <br>
	  <div class="lang-switch">
		<a href="signupForm.html" class="lang-btn" id="Lang-btn">EN</a>
</div>
    </div>
  </header>

  <!-- Main -->
  <main class="app-main">
    <div class="container">
    <div class="form-box">
	
	<form id="signupForm">
	
	<label for="name">Prénom</label> <br>
	<input type="text" id="name" placeholder="Prénom" required/>
	<div id="name-error" class="field-error"></div>
	
	<label for="lastName">Nom de famille</label><br>
    <input type="text" id="lastName" placeholder="Nom de famille" required />
	<div id="lastName-error" class="field-error"></div>
	
    <br>
	<label for="parentName">Nom du parent (Optionnel)</label><br>
	<input type="text" placeholder="Nom du parent" id="parentName" />
    <br>
	
	<label for="emailAddress">Courriel</label><br>
	<input type="email" id="emailAddress" placeholder="Courriel" required/>
	<div id="emailAddress-error" class="field-error"></div>
	<br>
	
	<label for="phoneNumber">Numéro de téléphone</label><br>
	<input type="tel" id="phoneNumber" placeholder="XXX-XXX-XXXX" required/>
	<div id="phoneNumber-error" class="field-error"></div>
	<br>
	
	<label for="skateCanadaNumber">Numéro Patinage Canada</label><br>
	<input type="text" id="skateCanadaNumber" placeholder="XXXXXXXXXXX" required/>
	<div id="skateCanadaNumber-error" class="field-error"></div>
	<br>
	
	<label for="password">Créez un mot de passe</label><br>
	<input type="password" id="password" placeholder="Mot de passe" required/>
	<div id="password-error" class="field-error"></div>
	
	<label for="passwordConfirmation">Confirmation du mot de passe</label><br>
	<input type="password" id="passwordConfirmation" placeholder="Confirmation du mot de passe" required/>
	<div id="passwordConfirmation-error" class="field-error"></div>
	<br><br>

    <button type="submit" id="createAccount" >Créer un compte</button>
	<br><br>	

	</form>
	
    
    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-content">
      <span>© 2026 Momentum Performance</span>
    </div>
	<script type="module" src="signupFormFR.js"></script>
  </footer>
</body>
</html>
