<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>

  <div>
    <div class="lang-box">
      <button id="lang-toggle" class="lang-btn">EN / FR</button> 
    </div>
  </div>
</header>


  <main class="app-main">
  
	
		<div class="container">
			<div class="box">
        <h3  data-key-placeholder="WelcomeToDashboard">Welcome to your dashboard</h3>
			</div>
		</div>
  



      <nav class="bottom-nav">
        <div class="nav-item active">
          <img src="dashboardIcon.png" class="icon" />
           <span data-key="dashboard">Dashboard</span>
        </div>

        <div class="nav-item">
          <img src="calendarIcon.png" class="icon" />
            <span data-key="calendar">Calendar</span>
        </div>

        <div class="nav-item">
          <img src="paymentIcon.png" class="icon" />
            <span data-key="payment">Payment</span>
        </div>

        <div class="nav-item">
          <img src="settings.png" class="icon" />
            <span data-key="settings">Settings</span>
        </div>

        <div class="nav-item">
          <img src="logout.png" class="icon" />
            <span data-key="logout">Logout</span>
        </div>

</nav>


  </main>


  <footer class="app-footer">
    <div class="footer-content">
      <span>© 2026 Momentum Performance</span>
    </div>
	<script type="module" src="coachAccount.js"></script>
  </footer>
</body>
</html>
