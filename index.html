<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-content">
      <div class="logo" align=center>Momentum Performance</div>
	  <br>
	  <div class="lang-switch">
		<a href="loginFR.html" class="lang-btn" id="Lang-btn">FR</a>
</div>
    </div>
  </header>

  <!-- Main -->
  <main class="app-main">
    <div class="container">
    <div class="box">
    <h2 align="center">Connexion</h2>

    <input type="email" id="email" placeholder="Email" />
	<div id="email-error" class="field-error"></div>
    <br><br>

    <input type="password" id="password" placeholder="Password" />
	<div id="password-error" class="field-error"></div>
    <br><br>

    <button id="login-btn" >Login</button>
	<br><br>	
	<a href="signupForm.html" rel="stylesheet">Create account</a>
	
    </div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-content">
      <span>© 2026 Momentum Performance</span>
    </div>
	<script type="module" src="login.js"></script>
  </footer>
</body>
</html>
