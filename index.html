<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body>

<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>

  <div class="lang-box">
    <button id="lang-toggle" class="lang-btn">EN / FR</button> 
  </div>

</header>


  <main class="app-main">
    <div class="container">
		<div class="box">
			<h2 data-key="login">Connexion</h2>

				<input type="email" id="email" data-key-placeholder="email" placeholder="Email"  />
					<div id="email-error" class="field-error">
					</div><br><br>
    

						<input type="password" id="password" data-key-placeholder="password" placeholder="Password" />
							<div id="password-error" class="field-error">
							</div><br><br>
    

								<button id="login-btn" data-key="login">Login</button><br><br>
		
										<a href="signupForm.html" rel="stylesheet" data-key="createAccount">Create account</a>
	
		</div>
	</div>
  </main>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="footer-content">
      <span>© 2026 Momentum Performance</span>
    </div>
	<script type="module" src="login.js"></script>
  </footer>
</body>
</html>
