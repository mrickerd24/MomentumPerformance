<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Momentum Performance</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>


<body>
 
<header class="app-header">
  <div class="header-box">
    <img src="logo.png" alt="Momentum Performance" class="logo" />
  </div>

</header>


  <main class="app-main">
  
	
		<div class="container">
    
			<div class="box">
        <h3  data-key-placeholder="WelcomeToDashboard">Welcome to your dashboard</h3>
        <br>      
        <div class="row">
          <div class="boxbluesmall"> 
            <p  data-key-placeholder="clubCoaches">Coaches</p>         
          </div>
        <br>        
          <div class="boxgreensmall"> 
            <p  data-key-placeholder="clubStudents">Students</p>         
          </div>
        </div>
        <br><br>
        <div class="row">
          <div class="boxredsmall"> 
            <p  data-key-placeholder="clubSchedule">Schedule</p>         
          </div>
        <br>
          <div class="boxpurplesmall"> 
            <p  data-key-placeholder="iceHours">Total ice hours this week</p>         
          </div>          
        </div>
        <br><br>
      </div>
</div>


<nav class="bottom-nav">
        <button class="nav-item" id="dashboard-btn" onclick="window.location.href='adminAccount.html'">
          <img src="dashboardIcon.png" class="icon" />
           <span data-key="dashboard">Dashboard</span>
        </button>

        <button class="nav-item" id="calendar-btn">
          <img src="calendarIcon.png" class="icon" />
            <span data-key="calendar">Calendar</span>
        </button>

        <button class="nav-item" id="payment-btn">
          <img src="paymentIcon.png" class="icon" />
            <span data-key="payment">Payment</span>
        </button>

        <button class="nav-item" id="settings-btn" onclick="window.location.href='accountSettingsAdmin.html'">
          <img src="settings.png" class="icon" />
            <span data-key="settings">Settings</span>
        </button>

      <button class="nav-item" id="logout-btn">
        <img src="logout.png" class="icon" />
          <span data-key="logout">Logout</span>
      </button>

</nav>


  </main>


  <footer class="app-footer">
    <br><br>
    <div class="footer-content">
      <span>© 2026 Momentum Performance</span>
    </div>
	<script type="module" src="coachAccount.js"></script>
  </footer>
</body>
</html>
